apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: parkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SERVER_ROOT_URL
          value: http://192.168.201.98:50030/grafana
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 120
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 120
          periodSeconds: 10
        #volumeMounts:
        #- name: config
          #mountPath: /etc/grafana/grafana.ini
          #subPath: grafana.ini
      #volumes:
      #- name: config
        #configMap:
          #name: grafana-config
