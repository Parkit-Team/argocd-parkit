apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: parkit
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0.13
        args: ["--bind_ip", "0.0.0.0", "--noauth", "--wiredTigerCacheSizeGB", "0.125"]
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
#        startupProbe:
#          tcpSocket:
#            port: 27017
#          failureThreshold: 30
#          periodSeconds: 10
#        livenessProbe:
#          tcpSocket:
#            port: 27017
#          initialDelaySeconds: 30
#          periodSeconds: 10
#        readinessProbe:
#          tcpSocket:
#            port: 27017
#          initialDelaySeconds: 10
#          periodSeconds: 5
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
