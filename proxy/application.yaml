apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Parkit-Team/argocd-parkit.git
    targetRevision: main
    path: proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: parkit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
