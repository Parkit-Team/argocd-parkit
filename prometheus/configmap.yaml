apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: parkit
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      scrape_timeout: 25s

    scrape_configs:
      - job_name: "prometheus"
        metrics_path: /prometheus/metrics
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: 'kafka'
        static_configs:
          - targets: ['my-kafka:9308']

      - job_name: 'analysis-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['analysis-service:8081']

      - job_name: 'mongodb'
        static_configs:
          - targets: ['mongodb:9216']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis:9121']