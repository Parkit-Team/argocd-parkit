apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: parkit
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
    rule_files:
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
            labels:
              app: "prometheus"
      - job_name: 'kafka'
        static_configs:
          - targets: ['10.111.214.84:9308']
      - job_name: 'analysis-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['10.100.93.20:8081']
      - job_name: 'socket-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['10.102.138.204:8082']