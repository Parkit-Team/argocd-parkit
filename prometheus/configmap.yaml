apiVersion: v1
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: parkit
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        metrics_path: /metrics  
        static_configs:
          - targets: ["prometheus:9090"]
            labels:
              app: "prometheus"

      - job_name: 'kafka'
        static_configs:
          - targets: ['my-kafka:9308']

      - job_name: 'analysis-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['analysis-service:8081']

      - job_name: 'socket-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['socket-service:8082']

      - job_name: 'mongodb'
        static_configs:
          - targets: ['mongodb:9216']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis:9121']