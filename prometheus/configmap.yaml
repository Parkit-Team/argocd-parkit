apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: parkit
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: "prometheus"
        metrics_path: /metrics  
        static_configs:
          - targets: ["prometheus:9090"]
            labels:
              app: "prometheus"

      - job_name: 'kafka'
        scrape_interval: 60s
        static_configs:
          - targets: ['kafka-exporter-prometheus-kafka-exporter:9308']

      - job_name: 'analysis-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['analysis-service:8081']

      - job_name: 'socket-service'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['socket-service:8082']

      - job_name: 'mongodb'
        scrape_interval: 60s
        static_configs:
          - targets: ['mongodb-exporter:9216']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']