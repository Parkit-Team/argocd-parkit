# 리라이트가 필요한 서비스들 (Socket, Report)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkit-rewrite-ingress
  namespace: parkit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 소켓 서버
      - path: /socket(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: socket-service
            port:
              number: 8082
      # 레포트 서비스
      - path: /report(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: report-service
            port:
              number: 8083
---
# 리라이트가 필요 없는 서비스들 (React, Prometheus, Grafana)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkit-direct-ingress
  namespace: parkit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 리액트 프론트엔드 (메인 화면)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: client-service
            port:
              number: 80
      # 프로메테우스
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      # 그라파나
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000