apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkit-web-ingress
  namespace: parkit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m" 
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 1. 리액트 프론트엔드 (메인 화면)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: client-service
            port:
              number: 80
      # 2. 프로메테우스
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      # 3. 그라파나
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      # 4. 소켓 서버
      # (note) /socket, /report 는 별도 Ingress로 분리 (rewrite/websocket 필요)

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkit-service-ingress
  namespace: parkit
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /socket(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: socket-service
            port:
              number: 8082
      - path: /report(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: report-service
            port:
              number: 8083
