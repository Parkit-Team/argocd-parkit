apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: parkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      containers:
      - name: analysis-service
        image: parkitteam/analysis-service:build-49
        ports:
        - containerPort: 8081
        env:
        - name: SERVER_PORT
          value: "8081"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "my-kafka:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-0.redis.parkit.svc.cluster.local" 
