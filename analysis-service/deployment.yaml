apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: parkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: analysis-service
        image: parkitteam/analysis-service:build-89
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "512Mi"
        env:
        - name: SERVER_PORT
          value: "8081"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "my-kafka:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis"
